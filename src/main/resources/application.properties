spring.application.name=firebaseStorage
spring.datasource.url=jdbc:postgresql://${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update

server.port=${PORT:8080}

spring.multipart.max-file-size=5MB
spring.servlet.multipart.max-file-size=5MB

firebase.config.project-id=${FIREBASE_PROJECT_ID}
firebase.config.storage-bucket=${FIREBASE_STORAGE_BUCKET}
firebase.config.service-account-path=${FIREBASE_CONFIG_PATH}